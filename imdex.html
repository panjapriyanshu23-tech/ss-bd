<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🤍</title>
<style>
/* Body & background */
body{
  margin:0;
  padding:0;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow:hidden;
  text-align:center;
  height:100vh;
}

/* Stars */
.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation: twinkle 3s infinite alternate;
  z-index:1;
}
@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* Shooting stars */
@keyframes shoot {
  0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
  100% { transform: translateX(120vw) translateY(60vh) rotate(45deg); opacity:0; }
}

/* Container */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:600px;
  background-color: rgba(22,27,34,0.85);
  padding: 30px;
  border-radius:15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index:10;
  max-height:80vh;
  overflow-y:auto;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Text */
h1{
  font-weight:300;
  margin-bottom:20px;
  color: #58a6ff;
}
p{
  font-size:18px;
  line-height:1.6;
  margin-bottom: 15px;
  text-align: left;
  min-height: 1.2em;
  /* Yahan fix kiya: opacity 1 kar di */
  opacity: 1 !important; 
}

/* Cursor for typewriter */
.cursor {
  display: inline-block;
  width: 8px;
  height: 18px;
  background-color: #58a6ff;
  margin-left:5px;
  vertical-align: middle;
  animation: blink 0.8s step-start infinite;
}
@keyframes blink{
  50% { background-color: transparent; }
}

/* Floating hearts */
@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity:1; }
  100% { transform: translateY(-100px) scale(1.5); opacity:0; }
}

/* Music play button */
#playMusic{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;
  padding:10px 15px;
  background:#58a6ff;
  border:none;
  border-radius:20px;
  color:white;
  font-size:14px;
  cursor:pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4bfb5e.mp3" type="audio/mpeg">
</audio>
<button id="playMusic">🎵 Play Music</button>

<div class="container">
  <h1>Happy Birthday 🤍</h1>
  <p id="line1"></p>
  <p id="line2"></p>
  <p id="line3"></p>
  <p id="line4"></p>
</div>

<script>
// =================== Music Button ===================
const music = document.getElementById('bgMusic');
document.getElementById('playMusic').addEventListener('click', function() {
  if (music.paused) {
    music.play();
    this.innerText = "⏸ Pause Music";
  } else {
    music.pause();
    this.innerText = "🎵 Play Music";
  }
});

// =================== Typewriter Logic ===================
const lines = [
`Things may not be the same anymore, and maybe they never will be, but what we shared was always real to me. No matter how much distance came between us, the memories and the respect I have for you never faded.`,
`If I ever said or did anything that hurt you, even unintentionally, I’m truly sorry. It was never my intention to cause you pain. Please forgive me if I ever became the reason for your sadness.`,
`On your birthday, I just want you to know that I genuinely wish you peace, growth, and all the happiness in the world. You deserve a beautiful life, with or without me in it.`,
`Happy Birthday, dear. I’ll always wish the best for you. 🤍`
];

let currentLine = 0;
let currentChar = 0;
const delay = 40; // typing speed

function type() {
  if (currentLine < lines.length) {
    let targetElement = document.getElementById(`line${currentLine + 1}`);
    
    // Cursor handling
    let cursor = document.querySelector('.cursor');
    if(cursor) cursor.remove();
    
    targetElement.innerHTML = lines[currentLine].substring(0, currentChar) + '<span class="cursor"></span>';
    
    if (currentChar < lines[currentLine].length) {
      currentChar++;
      setTimeout(type, delay);
    } else {
      // Remove cursor from finished line and move to next
      targetElement.innerHTML = lines[currentLine]; 
      currentLine++;
      currentChar = 0;
      setTimeout(type, 800); // Pause between lines
    }
  }
}

// Start typing on load
window.onload = type;

// =================== Stars Background ===================
function createStars() {
  for(let i=0; i<100; i++){
    let star = document.createElement("div");
    star.classList.add("star");
    let size = Math.random()*3;
    star.style.width = size + "px";
    star.style.height = size + "px";
    star.style.top = Math.random()*100 + "vh";
    star.style.left = Math.random()*100 + "vw";
    star.style.animationDuration = (Math.random()*3 + 2) + "s";
    document.body.appendChild(star);
  }
}
createStars();

// Shooting stars function
function shootingStar(){
  let star = document.createElement("div");
  star.style.position = "absolute";
  star.style.width = "2px";
  star.style.height = "2px";
  star.style.background = "white";
  star.style.top = Math.random()*40 + "vh";
  star.style.left = "-10px";
  star.style.animation = "shoot 2s linear forwards";
  star.style.zIndex = "1";
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 2000);
}
setInterval(shootingStar, 4000);

// =================== Heart Click Effect ===================
document.addEventListener("click", (e) => {
  if(e.target.id === 'playMusic') return;
  const colors = ["#ff4d6d", "#ffb347", "#4dffb3", "#ff71ce"];
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.style.position = "fixed";
  heart.style.left = (e.clientX - 10) + "px";
  heart.style.top = (e.clientY - 10) + "px";
  heart.style.fontSize = "20px";
  heart.style.pointerEvents = "none";
  heart.style.animation = "floatUp 1s forwards ease-out";
  heart.style.zIndex = "100";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
});
</script>

</body>
</html>
