<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>
<style>
/* Body & background */
body{
  margin:0;
  padding:0;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
  font-family: 'Segoe UI', sans-serif;
  overflow:hidden;
  text-align:center;
  height:100vh;
}

/* Stars */
.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation: twinkle 3s infinite alternate;
  z-index:1;
}
@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* Shooting stars */
@keyframes shoot {
  to {
    transform: translateX(120vw) translateY(60vh) rotate(45deg);
    opacity:0;
  }
}

/* Container */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:800px;
  background-color: rgba(22,27,34,0.95);
  padding: 30px;
  border-radius:8px;
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
  z-index:10;
  overflow-y:auto;
  max-height:80vh;
}

/* Text */
h1{
  font-weight:300;
  margin-bottom:30px;
}
p{
  font-size:18px;
  line-height:1.6;
  opacity:0;
}

/* Cursor for typewriter */
.cursor {
  display: inline-block;
  width: 10px;
  background-color: #58a6ff;
  margin-left:2px;
  animation: blink 1s step-start infinite;
}
@keyframes blink{
  50% { background-color: transparent; }
}

/* Floating hearts */
@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity:1; }
  100% { transform: translateY(-80px) scale(1.2); opacity:0; }
}

/* Music play button */
#playMusic{
  position:fixed;
  top:20px;
  right:20px;
  z-index:20;
  padding:10px 15px;
  background:#58a6ff;
  border:none;
  border-radius:5px;
  color:white;
  font-size:16px;
  cursor:pointer;
}
#playMusic:hover{
  background:#1f6feb;
}
</style>
</head>
<body>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4bfb5e.mp3" type="audio/mpeg">
</audio>
<button id="playMusic">🎵 Play Music</button>

<!-- Container -->
<div class="container">
  <h1>Happy Birthday 🤍</h1>
  <p id="line1"></p>
  <p id="line2"></p>
  <p id="line3"></p>
  <p id="line4"></p>
</div>

<script>
// =================== Music Button ===================
const music = document.getElementById('bgMusic');
document.getElementById('playMusic').addEventListener('click',()=>{
  music.play();
});

// =================== Typewriter ===================
const lines = [
`Things may not be the same anymore, and maybe they never will be, but what we shared was always real to me. No matter how much distance came between us, the memories and the respect I have for you never faded.`,
`If I ever said or did anything that hurt you, even unintentionally, I’m truly sorry. It was never my intention to cause you pain. Please forgive me if I ever became the reason for your sadness.`,
`On your birthday, I just want you to know that I genuinely wish you peace, growth, and all the happiness in the world. You deserve a beautiful life, with or without me in it.`,
`Happy Birthday, dear. I’ll always wish the best for you. 🤍`
];

const delay = 50; // typing speed in ms
function typeLine(lineIndex, charIndex){
  if(lineIndex >= lines.length) return;
  const lineEl = document.getElementById(`line${lineIndex+1}`);
  lineEl.innerHTML += lines[lineIndex][charIndex] || '';
  if(charIndex < lines[lineIndex].length - 1){
    setTimeout(()=>typeLine(lineIndex,charIndex+1),delay);
  } else {
    if(lineIndex < lines.length -1){
      const cursor = document.createElement('span');
      cursor.classList.add('cursor');
      document.getElementById(`line${lineIndex+2}`).appendChild(cursor);
      setTimeout(()=>typeLine(lineIndex+1,0),delay*2);
    }
  }
}
// Start typing with cursor
const cursorStart = document.createElement('span');
cursorStart.classList.add('cursor');
document.getElementById('line1').appendChild(cursorStart);
typeLine(0,0);

// =================== Stars ===================
document.addEventListener("DOMContentLoaded", ()=>{
  for(let i=0;i<100;i++){
    let star = document.createElement("div");
    star.classList.add("star");
    star.style.width=Math.random()*3+"px";
    star.style.height=star.style.width;
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(star);
  }
});

// =================== Shooting Stars ===================
function shootingStar(){
  let star = document.createElement("div");
  star.classList.add("star");
  star.style.width="2px";
  star.style.height="2px";
  star.style.top = Math.random()*50 + "vh";
  star.style.left = "-10px";
  star.style.background = "white";
  star.style.opacity = 0.8;
  star.style.transform = "rotate(45deg)";
  star.style.animation = "shoot 1s linear forwards";
  document.body.appendChild(star);
  setTimeout(()=>document.body.removeChild(star),1000);
}
setInterval(shootingStar,3000);

// =================== Clickable Hearts ===================
document.body.addEventListener("click",(e)=>{
  const colors = ["#ff4d6d","#ffb347","#4dffb3","#4da6ff","#ff71ce","#ffff4d"];
  let heart = document.createElement("div");
  heart.innerHTML="❤️";
  heart.style.position="absolute";
  heart.style.left=e.clientX+"px";
  heart.style.top=e.clientY+"px";
  heart.style.fontSize = `${12 + Math.random()*20}px`;
  heart.style.color = colors[Math.floor(Math.random()*colors.length)];
  heart.style.zIndex = 20;
  heart.style.pointerEvents = "none";
  heart.style.animation="floatUp 1.5s forwards ease-out";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),1500);
});
</script>

</body>
</html>
