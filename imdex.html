<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Dancing+Script:wght@600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 85%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .message-box {
            min-height: 200px;
            text-align: left;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
        }

        /* Cursor Effect */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: white;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Floating Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        /* Music Control */
        #musicBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }

        #musicBtn:hover { background: rgba(255,255,255,0.4); }

    </style>
</head>
<body>

    <button id="musicBtn">🎵 Play Vibe</button>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <h1>Happy Birthday 🤍</h1>
        <div class="message-box">
            <p id="typed-text"></p>
        </div>
    </div>

    <div id="stars"></div>

    <script>
        const text = [
            "Things may not be the same anymore, but what we shared was always real to me. The respect I have for you never faded. ",
            "If I ever said or did anything that hurt you, even unintentionally, I’m truly sorry. It was never my intention to cause you pain. Please forgive me if I ever became the reason for your sadness. ",
            "On your birthday, I just want you to know that I genuinely wish you peace, growth, and all the happiness in the world. You deserve a beautiful life, with or without me in it. ",
            "Happy Birthday, dear. I’ll always wish the best for you. 🤍"
        ];

        let lineIndex = 0;
        let charIndex = 0;
        const speed = 40;
        const target = document.getElementById("typed-text");

        function type() {
            if (lineIndex < text.length) {
                if (charIndex < text[lineIndex].length) {
                    // Type character by character
                    target.innerHTML = text.slice(0, lineIndex).join("<br><br>") + 
                                     "<br><br>" + 
                                     text[lineIndex].substring(0, charIndex + 1) + 
                                     '<span class="cursor"></span>';
                    charIndex++;
                    setTimeout(type, speed);
                } else {
                    // Move to next paragraph
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(type, 1000);
                }
            } else {
                // Final text without blinking cursor at the end
                target.innerHTML = text.join("<br><br>") + " 🤍";
            }
        }

        // Start Typing
        window.onload = () => {
            setTimeout(type, 1000);
            createStars();
        };

        // Background Stars
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = Math.random() * 5 + 5 + 's';
                container.appendChild(star);
            }
        }

        // Music Logic
        const btn = document.getElementById('musicBtn');
        const music = document.getElementById('bgMusic');
        btn.onclick = () => {
            if (music.paused) {
                music.play();
                btn.innerText = "⏸ Pause Music";
            } else {
                music.pause();
                btn.innerText = "🎵 Play Vibe";
            }
        };
    </script>
</body>
</html>
