<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🤍</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0e14; /* Simple Dark Background */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.05); /* Very light glass effect */
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 300;
            font-size: 28px;
            margin-bottom: 30px;
            color: #ffffff;
            text-align: center;
        }

        .message-content {
            font-size: 17px;
            line-height: 1.7;
            color: #d1d1d1;
            text-align: left;
        }

        .line {
            margin-bottom: 20px;
            display: block;
        }

        /* Cursor blinking effect */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: #58a6ff;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 
            50% { opacity: 0; } 
        }

        #playBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <button id="playBtn">🎵 Play Music</button>
    <audio id="myAudio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div class="container">
        <h1>Happy Birthday 🤍</h1>
        <div class="message-content" id="typewriter"></div>
    </div>

    <script>
        const messageParts = [
            "If I ever said or did anything that hurt you, even unintentionally, I’m truly sorry. It was never my intention to cause you pain. Please forgive me if I ever became the reason for your sadness.",
            "On your birthday, I just want you to know that I genuinely wish you peace, growth, and all the happiness in the world. You deserve a beautiful life, with or without me in it.",
            "Happy Birthday, dear. I’ll always wish the best for you. 🤍"
        ];

        let partIdx = 0;
        let charIdx = 0;
        const target = document.getElementById("typewriter");

        function type() {
            if (partIdx < messageParts.length) {
                // Get current text typed so far
                let currentFullText = messageParts.slice(0, partIdx).join("<br><br>");
                if (partIdx > 0) currentFullText += "<br><br>";
                
                target.innerHTML = currentFullText + 
                                  messageParts[partIdx].substring(0, charIdx) + 
                                  '<span class="cursor"></span>';
                
                if (charIdx < messageParts[partIdx].length) {
                    charIdx++;
                    setTimeout(type, 35); // Typing speed
                } else {
                    partIdx++;
                    charIdx = 0;
                    setTimeout(type, 800); // Pause before next paragraph
                }
            } else {
                // Remove cursor at the end
                let finalContent = messageParts.join("<br><br>");
                target.innerHTML = finalContent;
            }
        }

        // Start typing
        window.onload = () => setTimeout(type, 1000);

        // Music toggle
        const btn = document.getElementById('playBtn');
        const audio = document.getElementById('myAudio');
        btn.onclick = () => {
            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸ Pause";
            } else {
                audio.pause();
                btn.innerText = "🎵 Play Music";
            }
        };
    </script>
</body>
</html>
